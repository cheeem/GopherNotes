<!DOCTYPE html>
<html>
	<head>
		<title>Gopher Notes</title>
		<link rel="stylesheet" type="text/css" href="src/css/main.css" />
	</head>
	<body>
		<div id="header">
			<img src="src/images/home_logo.png" id="logo" alt="Gopher Grades Logo" />
			<div id="user-area">
				<img
					src="src/images/profile_icon.png"
					id="user-profile"
					alt="User Profile"
				/>
				<button id="log-in-button" onclick="location.href='login.html';">
					Log In
				</button>
			</div>
		</div>
		<div id="container">
			<div id="left-nav">
				<form id="search-form">
					<input
						type="text"
						id="course-department"
						name="course-department"
						placeholder="Course Department"
					/>
					<input
						type="text"
						id="course-name"
						name="course-name"
						placeholder="Course Name"
					/>
					<input
						type="text"
						id="professor"
						name="professor"
						placeholder="Professor"
					/>
					<input type="text" id="year" name="year" placeholder="Year" />
					<button type="submit" class="form-button">Search</button>
				</form>
				<button id="contact-us" class="form-button">Contact Us</button>
			</div>
			<div id="main-content">
				<div class="note">Note 1</div>
				<div class="note">Note 2</div>
				<div class="note">Note 3</div>
				<div class="note">Note 4</div>
			</div>
			<button id="upload-button" onclick="location.href='upload.html';">
				Upload
			</button>
		</div>
		<script src="script.js"></script>
	</body>
</html>
